<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – RepairMaster Portal</title>
    <link rel="icon" type="image/jpg" href="app/src/main/res/drawable/img_brand_logo_circular_1782765220741.jpg" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Theme Styling Config -->
    <script src="style.js"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            background: #0A0F1D;
            color: #E8EDF5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .container-custom {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .text-teal {
            color: #14B8A6;
        }
        .btn-teal {
            background: linear-gradient(135deg, #0D9488, #14B8A6);
            color: #0A0F1D;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 24px rgba(13, 148, 136, 0.3);
        }
        .btn-teal:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 36px rgba(13, 148, 136, 0.45);
        }
        .rm-logo {
            background: linear-gradient(135deg, #0D9488, #14B8A6);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            color: #0A0F1D;
            box-shadow: 0 8px 30px rgba(13, 148, 136, 0.3);
            flex-shrink: 0;
        }
        .form-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }
        .form-card input, .form-card select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 16px;
        }
        .form-card input:focus, .form-card select:focus {
            border-color: #14B8A6;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
        }
        .form-card select option {
            background: #121B33;
            color: #fff;
        }
        .form-card label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .nav-link {
            color: rgba(255, 255, 255, 0.65);
            transition: all 0.3s;
            text-decoration: none;
            padding: 6px 0;
            border-bottom: 2px solid transparent;
        }
        .nav-link:hover,
        .nav-link.active {
            color: #14B8A6;
            border-bottom-color: #14B8A6;
        }
        .mobile-menu {
            display: none;
        }
        @media (max-width: 768px) {
            .mobile-menu {
                display: block;
            }
            .desktop-nav {
                display: none;
            }
            .form-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- HEADER -->
    <header class="container-custom py-4 flex items-center justify-between flex-wrap gap-4 sticky top-0 z-40 bg-[#0A0F1D]/85 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='index.html'">
            <img src="app/src/main/res/drawable/img_brand_logo_better_clean_1782737996064.jpg" alt="RepairMaster" class="h-11 md:h-14 object-contain rounded-xl hover:border-teal/20 transition-all duration-300" />
        </div>

        <nav class="desktop-nav flex items-center gap-8 text-sm font-medium">
            <a href="index.html" class="nav-link">Home</a>
            <a href="request.html" class="nav-link">Repair Request</a>
            <a href="app.html" class="nav-link">Download</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="login.html" class="nav-link">Login</a>
            <a href="signup.html" class="nav-link active">Sign Up</a>
        </nav>

        <!-- Mobile Menu Toggle Button -->
        <button class="mobile-menu text-white text-2xl" onclick="toggleMobileMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div id="mobileNav" class="hidden absolute top-full left-0 w-full bg-[#0A0F1D]/95 backdrop-blur-md p-6 flex flex-col gap-4 text-center border-b border-white/5 z-50">
            <a href="index.html" class="nav-link">Home</a>
            <a href="request.html" class="nav-link">Repair Request</a>
            <a href="app.html" class="nav-link">Download</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="login.html" class="nav-link">Login</a>
            <a href="signup.html" class="nav-link active">Sign Up</a>
        </div>
    </header>

    <!-- MAIN FORM CONTAINER -->
    <main class="py-16 flex items-center justify-center flex-1">
        <div class="form-card max-w-md w-full">
            <div class="text-center mb-6">
                <div class="rm-logo mx-auto mb-4" style="width:64px;height:64px;font-size:28px;">RM</div>
                <h2 class="text-2xl font-bold text-white font-display">Create Account</h2>
                <p class="text-sm text-gray-400">Join RepairMaster Support Hub</p>
            </div>

            <form id="signupForm" onsubmit="signupUser(event)">
                <div>
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Akash Chaware" required>
                </div>
                <div>
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="tel" id="signupPhone" placeholder="+91 98765 43210" required>
                </div>
                <div>
                    <label>City/Region</label>
                    <select id="signupCity" required class="w-full bg-slate-900 border border-grayBorder/40 rounded-xl px-4 py-2.5 text-white text-sm focus:border-teal outline-none transition cursor-pointer">
                        <option value="Wardha" selected>Wardha</option>
                        <option value="Arvi">Arvi</option>
                        <option value="Nagpur">Nagpur</option>
                        <option value="Amravati">Amravati</option>
                        <option value="Chandrapur">Chandrapur</option>
                        <option value="Bhandara">Bhandara</option>
                        <option value="Raipur">Raipur</option>
                    </select>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn-teal w-full mt-4">Create Account</button>
            </form>
            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account? <a href="login.html" class="text-teal font-bold hover:underline">Login</a>
            </p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-white/5 bg-[#080D1A] py-6 text-center text-xs text-gray-600">
        <p>© 2026 RepairMaster Direct To Consumer Support. Wardha Hub. All rights reserved.</p>
    </footer>

    <!-- Mobile App Bottom Navigation Bar -->
    <div class="md:hidden fixed bottom-0 left-0 w-full bg-[#070b14]/95 border-t border-white/10 backdrop-blur-lg flex justify-around py-3 z-50 text-center font-display shadow-2xl">
        <a href="index.html" class="flex flex-col items-center text-[10px] text-gray-400 hover:text-teal transition">
            <i class="fa-solid fa-house text-base mb-1"></i>
            <span>Home</span>
        </a>
        <a href="request.html" class="flex flex-col items-center text-[10px] text-gray-400 hover:text-teal transition">
            <i class="fa-solid fa-screwdriver-wrench text-base mb-1"></i>
            <span>Request</span>
        </a>
        <a href="dashboard.html" class="flex flex-col items-center text-[10px] text-gray-400 hover:text-teal transition">
            <i class="fa-solid fa-chart-simple text-base mb-1"></i>
            <span>Hub</span>
        </a>
        <a href="app.html" class="flex flex-col items-center text-[10px] text-gray-400 hover:text-teal transition">
            <i class="fa-solid fa-download text-base mb-1"></i>
            <span>App</span>
        </a>
    </div>

    <!-- Toast Container -->
    <div id="toast" class="fixed bottom-20 md:bottom-8 right-8 z-50 px-6 py-4 rounded-xl font-bold text-sm shadow-xl max-w-md pointer-events-none opacity-0 translate-y-8 transition-all duration-500"></div>

    <!-- Supabase Client & Multi-Page script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
